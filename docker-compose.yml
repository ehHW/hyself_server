services:

  # ── 数据库 ──────────────────────────────────────────────────
  db:
    image: hyself_server-db:${IMAGE_TAG:-1.0.0}
    build:
      context: ./docker/mysql
    container_name: hyself_db
    restart: unless-stopped
    env_file:
      - .env.docker
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"          # 如不需要宿主机直连，可注释此行
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root --password=$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s     # 给 MySQL 初始化留出充足时间

  # ── 缓存 / 消息队列 ─────────────────────────────────────────
  redis:
    image: hyself_server-redis:${IMAGE_TAG:-1.0.0}
    build:
      context: ./docker/redis
    container_name: hyself_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"          # 如不需要宿主机直连，可注释此行
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── ASGI 后端（uvicorn） ─────────────────────────────────────
  backend:
    image: hyself_server-backend:1.1.0
    build:
      context: .
    container_name: hyself_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.docker
    environment:
      RUN_MIGRATIONS: "1"
    volumes:
      - /srv/www.hyself.top/hyself_server/uploads:/app/uploads    # 上传文件持久化到宿主机
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.socket(); s.settimeout(2); s.connect(('127.0.0.1', 8000)); s.close()\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    # entrypoint.sh 会先执行 migrate，然后执行下方 command
    command:
      - uv
      - run
      - uvicorn
      - hyself_server.asgi:application
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --workers
      - "4"

  # ── Celery Worker ────────────────────────────────────────────
  celery:
    image: hyself_server-celery:1.1.0
    build:
      context: .
    container_name: hyself_celery
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    env_file:
      - .env.docker
    environment:
      RUN_MIGRATIONS: "0"
    volumes:
      - /srv/www.hyself.top/hyself_server/uploads:/app/uploads    # 与 backend 共享同一目录
    command:
      - uv
      - run
      - celery
      - -A
      - hyself_server
      - worker
      - -l
      - info
      - --concurrency
      - "4"

volumes:
  mysql_data:
  redis_data:
